name: Deploy QuickFit

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write runtime weather config
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          if [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "OPENWEATHER_API_KEY secret is required for weather support"
            exit 1
          fi

          mkdir -p src/scripts
          printf 'window.QUICKFIT_OPENWEATHER_API_KEY = "%s";\n' "$OPENWEATHER_API_KEY" > src/scripts/runtime-config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
